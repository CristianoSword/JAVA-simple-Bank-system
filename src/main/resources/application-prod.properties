# Simulando Producao com H2 persistente em arquivo
spring.datasource.url=jdbc:h2:file:./data/prod_bancodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=prod_user
spring.datasource.password=prod_pass123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Nunca create-drop em prod!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Seguranca - desabilitando o banco exposto na web
spring.h2.console.enabled=false

# Desabilitar Swagger/OpenAPI em producao por seguranca
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
